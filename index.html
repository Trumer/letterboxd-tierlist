<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Film Tierlist — Letterboxd</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.15);
    --text: #e8e8f0;
    --text-muted: #6b6b80;
    --text-dim: #3a3a4a;
    --accent: #00c030;
    --accent-dim: rgba(0,192,48,0.12);
    --tier-s: #ff6b6b;
    --tier-a: #ff9f43;
    --tier-b: #ffd32a;
    --tier-c: #7bed9f;
    --tier-d: #74b9ff;
    --radius: 10px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Nunito', sans-serif; min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.4;
  }
  .page { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  header { margin-bottom: 2.5rem; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 3.2rem; letter-spacing: 0.05em; line-height: 1; }
  .logo span { color: var(--accent); }
  .tagline { font-size: 0.85rem; color: var(--text-muted); margin-top: 4px; letter-spacing: 0.04em; text-transform: uppercase; }

  .import-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 2rem; }
  .import-card h2 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 1rem; }
  .input-row { display: flex; gap: 10px; }
  input[type="text"] {
    flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text); font-family: 'Nunito', sans-serif; font-size: 0.95rem;
    padding: 0 1rem; height: 44px; outline: none; transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--text-dim); }

  button {
    background: var(--accent); border: none; border-radius: var(--radius-sm);
    color: #0d0d0f; font-family: 'Nunito', sans-serif; font-size: 0.9rem; font-weight: 600;
    padding: 0 1.25rem; height: 44px; cursor: pointer;
    transition: opacity 0.15s, transform 0.1s; white-space: nowrap;
    display: inline-flex; align-items: center; gap: 6px;
  }
  button:hover { opacity: 0.88; }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  button.secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  button.secondary:hover { border-color: var(--border-hover); }

  .filters { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; align-items: center; }
  .filters label { font-size: 0.8rem; color: var(--text-muted); }
  select {
    background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text); font-family: 'Nunito', sans-serif; font-size: 0.85rem;
    padding: 5px 10px; outline: none; cursor: pointer;
  }

  .progress-wrap { margin-top: 12px; display: none; }
  .progress-track { height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; transition: width 0.35s ease; }
  .progress-label { font-size: 0.78rem; color: var(--text-muted); margin-top: 6px; }
  .error { font-size: 0.85rem; color: #ff6b6b; margin-top: 10px; display: none; }

  .pool-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .pool-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); }
  .pool-meta { font-size: 0.78rem; color: var(--text-dim); }
  .pool-search { margin-bottom: 10px; }
  .pool-search input { width: 100%; max-width: 300px; font-size: 0.85rem; height: 36px; }

  .pool-wrap {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 12px; min-height: 100px; max-height: 340px; overflow-y: auto;
    display: flex; flex-wrap: wrap; gap: 8px; align-content: flex-start;
    margin-bottom: 2rem; transition: border-color 0.15s, background 0.15s;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  .pool-wrap.drag-over { border-color: var(--accent); background: rgba(0,192,48,0.05); }
  .empty-hint { width: 100%; text-align: center; font-size: 0.85rem; color: var(--text-dim); padding: 1.5rem 0; pointer-events: none; }

  .tierlist-section { margin-bottom: 2rem; }
  .tierlist-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 10px; }

  .tier-row { display: flex; align-items: stretch; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); margin-bottom: 6px; min-height: 120px; }
  .tier-label { width: 60px; min-width: 60px; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; letter-spacing: 0.05em; flex-shrink: 0; }
  .tier-S .tier-label { background: var(--tier-s); color: #3a0000; }
  .tier-A .tier-label { background: var(--tier-a); color: #3a1a00; }
  .tier-B .tier-label { background: var(--tier-b); color: #3a2a00; }
  .tier-C .tier-label { background: var(--tier-c); color: #003a10; }
  .tier-D .tier-label { background: var(--tier-d); color: #001e3a; }

  .tier-drop {
    flex: 1; display: flex; flex-wrap: wrap; align-items: flex-start; align-content: flex-start;
    gap: 8px; padding: 10px; background: var(--surface); min-height: 120px; transition: background 0.12s;
  }
  .tier-drop.drag-over { background: rgba(0,192,48,0.07); }
  .tier-drop .film-card { width: 68px; }

  .film-card {
    width: 82px; border-radius: var(--radius-sm); overflow: hidden;
    border: 1px solid var(--border); background: var(--surface2);
    cursor: grab; user-select: none; position: relative; flex-shrink: 0;
    transition: transform 0.12s, border-color 0.12s;
    touch-action: none; -webkit-user-select: none;
  }
  .film-card:hover { transform: translateY(-3px); border-color: var(--border-hover); }
  .film-card.dragging { opacity: 0.3; transform: scale(0.92); }
  .film-card:active { cursor: grabbing; }
  .film-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; background: var(--surface); }
  .film-card .no-poster { width: 100%; aspect-ratio: 2/3; display: flex; align-items: center; justify-content: center; background: var(--surface2); font-size: 10px; color: var(--text-muted); text-align: center; padding: 6px; line-height: 1.3; }
  .film-card .card-info { padding: 5px 5px 7px; }
  .film-card .card-title { font-size: 10px; font-weight: 600; color: var(--text); line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .film-card .card-year { font-size: 9px; color: var(--text-muted); margin-top: 2px; }

  .stars-badge {
    position: absolute; top: 4px; left: 4px;
    background: rgba(0,0,0,0.72); color: #f5c518;
    font-size: 9px; font-weight: 700; border-radius: 4px;
    padding: 1px 5px; line-height: 1.7; letter-spacing: 0.02em;
  }

  .return-btn {
    position: absolute; top: 4px; right: 4px;
    width: 20px; height: 20px; border-radius: 50%;
    background: rgba(0,0,0,0.7); color: #fff; font-size: 11px;
    display: none; align-items: center; justify-content: center;
    cursor: pointer; border: none; padding: 0; min-height: unset;
    font-family: 'Nunito', sans-serif; transition: background 0.12s;
  }
  .film-card:hover .return-btn { display: flex; }
  .return-btn:hover { background: rgba(0,192,48,0.85); opacity: 1; }

  .touch-dragging {
    position: fixed !important; z-index: 9999; pointer-events: none;
    opacity: 0.85; transform: scale(1.08) rotate(2deg);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5); transition: none !important;
  }
  .drop-highlight { border-color: var(--accent) !important; background: rgba(0,192,48,0.08) !important; }

  .actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .actions-right { margin-left: auto; display: flex; gap: 10px; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  @media (max-width: 600px) {
    .logo { font-size: 2.4rem; }
    .input-row { flex-direction: column; }
    .actions-right { margin-left: 0; }
  }
</style>
</head>
<body>
<div class="page">
  <header>
    <div class="logo">FILM<span>TIER</span></div>
    <div class="tagline">Letterboxd · Drag & Drop · S/A/B/C/D</div>
  </header>

  <div class="import-card">
    <h2>Load Profile</h2>
    <div class="input-row">
      <input type="text" id="profile-input" placeholder="letterboxd.com/username or just username" />
      <button id="load-btn" onclick="loadProfile()">&#9654; Load</button>
    </div>
    <div class="filters" id="filters" style="display:none">
      <label>Min rating:</label>
      <select id="score-filter" onchange="applyFilter()">
        <option value="0">All</option>
        <option value="1">&#9733;+</option>
        <option value="2">&#9733;&#9733;+</option>
        <option value="3">&#9733;&#9733;&#9733;+</option>
        <option value="4">&#9733;&#9733;&#9733;&#9733;+</option>
      </select>
      <label style="margin-left:6px"><input type="checkbox" id="score-toggle" checked onchange="applyFilter()" style="margin-right:4px;accent-color:var(--accent)">Show ratings</label>
    </div>
    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-label" id="progress-label">Loading...</div>
    </div>
    <div class="error" id="error-msg"></div>
  </div>

  <div class="pool-header">
    <span class="pool-title">Film Pool</span>
    <span class="pool-meta" id="pool-meta"></span>
  </div>
  <div class="pool-search" id="pool-search-wrap" style="display:none">
    <input type="text" id="pool-search" placeholder="Search pool..." oninput="applyFilter()" />
  </div>
  <div class="pool-wrap" id="pool" data-zone="pool">
    <div class="empty-hint">Load your profile — films will appear here</div>
  </div>

  <div class="tierlist-section">
    <div class="tierlist-label">Tierlist</div>
    <div id="tierlist">
      <div class="tier-row tier-S"><div class="tier-label">S</div><div class="tier-drop" data-zone="S"><div class="empty-hint">Drop here</div></div></div>
      <div class="tier-row tier-A"><div class="tier-label">A</div><div class="tier-drop" data-zone="A"><div class="empty-hint">Drop here</div></div></div>
      <div class="tier-row tier-B"><div class="tier-label">B</div><div class="tier-drop" data-zone="B"><div class="empty-hint">Drop here</div></div></div>
      <div class="tier-row tier-C"><div class="tier-label">C</div><div class="tier-drop" data-zone="C"><div class="empty-hint">Drop here</div></div></div>
      <div class="tier-row tier-D"><div class="tier-label">D</div><div class="tier-drop" data-zone="D"><div class="empty-hint">Drop here</div></div></div>
    </div>
  </div>

  <div class="actions">
    <button class="secondary" onclick="resetTierlist()">&#8617; Reset tierlist</button>
    <div class="actions-right">
      <button onclick="exportImage()">&#11015; Save as PNG</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
var TMDB_KEY = '4f4dfd8e0e28e0f68e785f33d3e2e5d7';
var allFilms = [];
var draggedCard = null;
var currentProxy = 0;

var PROXIES = [
  function(u) { return 'https://corsproxy.io/?url=' + encodeURIComponent(u); },
  function(u) { return 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u); },
  function(u) { return 'https://thingproxy.freeboard.io/fetch/' + u; },
  function(u) { return 'https://proxy.cors.sh/' + u; }
];

// Race all proxies — fastest wins
function proxyFetch(url) {
  return new Promise(function(resolve, reject) {
    var done = false;
    var failed = 0;
    var controllers = PROXIES.map(function(proxy, i) {
      var ctrl = new AbortController();
      fetch(proxy(url), { signal: ctrl.signal })
        .then(function(res) {
          if (done) return;
          if (res.ok) {
            done = true;
            controllers.forEach(function(c, j) { if (j !== i) try { c.abort(); } catch(e){} });
            currentProxy = i;
            resolve(res);
          } else {
            failed++;
            if (failed === PROXIES.length && !done) reject(new Error('All proxies failed'));
          }
        })
        .catch(function() {
          failed++;
          if (failed === PROXIES.length && !done) reject(new Error('All proxies failed'));
        });
      return ctrl;
    });
    setTimeout(function() {
      if (!done) { done = true; controllers.forEach(function(c) { try { c.abort(); } catch(e){} }); reject(new Error('Timeout')); }
    }, 15000);
  });
}

function parseUsername(s) {
  s = s.trim();
  try {
    var u = new URL(s.startsWith('http') ? s : 'https://' + s);
    var parts = u.pathname.split('/').filter(Boolean);
    if (parts.length) return parts[0];
  } catch(e) {}
  return s.replace(/^@/, '');
}

function starsToScore(str) {
  if (!str) return 0;
  var map = { '½': 0.5, '★': 1, '★½': 1.5, '★★': 2, '★★½': 2.5, '★★★': 3, '★★★½': 3.5, '★★★★': 4, '★★★★½': 4.5, '★★★★★': 5 };
  return map[str.trim()] || 0;
}

function starsDisplay(str) {
  if (!str || !str.trim()) return '';
  return str.trim();
}

function setProgress(pct, label) {
  var wrap = document.getElementById('progress-wrap');
  var fill = document.getElementById('progress-fill');
  var lbl  = document.getElementById('progress-label');
  if (pct <= 0) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  fill.style.width = pct + '%';
  if (label) lbl.textContent = label;
}

function setError(msg) {
  var el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

// Parse Letterboxd HTML page to extract films
function parseFilmsFromHTML(html) {
  var films = [];
  // Match film entries: data-film-slug and data-film-name and data-film-year
  var re = /data-film-slug="([^"]+)"[^>]*>[\s\S]*?<img[^>]+alt="([^"]+)"[^>]*>/g;
  // Better: parse the li.poster-container elements
  var liRe = /<li[^>]*class="[^"]*poster-container[^"]*"[^>]*>([\s\S]*?)<\/li>/g;
  var match;
  while ((match = liRe.exec(html)) !== null) {
    var block = match[1];
    var slugM = /data-film-slug="([^"]+)"/.exec(block);
    var nameM = /alt="([^"]+)"/.exec(block);
    var yearM = /data-film-release-year="([^"]+)"/.exec(block);
    var ratingM = /data-owner-rating="([^"]*)"/.exec(block);
    if (slugM && nameM) {
      var rawRating = ratingM ? parseInt(ratingM[1]) : 0;
      // Letterboxd stores rating as 2=★, 4=★★, 6=★★★, 8=★★★★, 10=★★★★★ (halves: 1,3,5,7,9)
      var starsStr = ratingToStars(rawRating);
      films.push({
        slug: slugM[1],
        name: nameM[1].replace(/&#(\d+);/g, function(m, n) { return String.fromCharCode(n); }),
        year: yearM ? yearM[1] : '',
        rating: rawRating,
        stars: starsStr
      });
    }
  }
  return films;
}

function ratingToStars(r) {
  var map = { 1:'½', 2:'★', 3:'★½', 4:'★★', 5:'★★½', 6:'★★★', 7:'★★★½', 8:'★★★★', 9:'★★★★½', 10:'★★★★★' };
  return map[r] || '';
}

// Get total pages from first page HTML
function getTotalPages(html) {
  var m = /class="paginate-page[^"]*"[^>]*>\s*(\d+)\s*<\/a>\s*(?:(?!paginate).)*<\/div>/s.exec(html);
  if (m) return parseInt(m[1]);
  // Try last page link
  var allNums = [];
  var re = /paginate-page[^"]*"[^>]*>\s*(\d+)\s*<\/a>/g;
  var match;
  while ((match = re.exec(html)) !== null) allNums.push(parseInt(match[1]));
  return allNums.length ? Math.max.apply(null, allNums) : 1;
}

async function loadProfile() {
  var raw = document.getElementById('profile-input').value;
  if (!raw.trim()) return;
  var username = parseUsername(raw);
  setError('');
  setProgress(5, 'Connecting to Letterboxd...');
  document.getElementById('load-btn').disabled = true;

  try {
    // Step 1: Load first page to get total count
    var firstUrl = 'https://letterboxd.com/' + username + '/films/';
    var firstRes = await proxyFetch(firstUrl);
    if (!firstRes.ok) throw new Error('User not found. Check the username.');
    var firstHtml = await firstRes.text();

    // Check if user exists
    if (firstHtml.indexOf('Sorry, we can') !== -1 || firstHtml.indexOf('Page Not Found') !== -1) {
      throw new Error('User "' + username + '" not found on Letterboxd.');
    }

    var totalPages = getTotalPages(firstHtml);
    var films = parseFilmsFromHTML(firstHtml);
    setProgress(15, 'Found ' + totalPages + ' pages, loading films...');

    // Step 2: Load remaining pages in parallel batches of 4
    if (totalPages > 1) {
      var pageNums = [];
      for (var p = 2; p <= totalPages; p++) pageNums.push(p);

      var batchSize = 4;
      for (var b = 0; b < pageNums.length; b += batchSize) {
        var batch = pageNums.slice(b, b + batchSize);
        var results = await Promise.all(batch.map(function(pg) {
          var url = 'https://letterboxd.com/' + username + '/films/page/' + pg + '/';
          return proxyFetch(url).then(function(r) { return r.text(); }).catch(function() { return ''; });
        }));
        results.forEach(function(html) {
          if (html) films = films.concat(parseFilmsFromHTML(html));
        });
        var pct = 15 + Math.round(((b + batch.length) / pageNums.length) * 55);
        setProgress(pct, 'Loaded ' + films.length + ' films...');
        if (b + batchSize < pageNums.length) await sleep(200);
      }
    }

    if (!films.length) throw new Error('No films found. The profile might be private.');

    setProgress(72, 'Fetching posters from TMDB...');

    // Step 3: Fetch TMDB posters in parallel batches
    var batchSize2 = 8;
    for (var i = 0; i < films.length; i += batchSize2) {
      var slice = films.slice(i, i + batchSize2);
      await Promise.all(slice.map(function(film) { return fetchPoster(film); }));
      var pct2 = 72 + Math.round(((i + batchSize2) / films.length) * 26);
      setProgress(Math.min(pct2, 97), 'Posters: ' + Math.min(i + batchSize2, films.length) + ' / ' + films.length);
    }

    allFilms = films;
    document.getElementById('filters').style.display = 'flex';
    document.getElementById('pool-search-wrap').style.display = 'block';
    applyFilter();
    setProgress(0);

  } catch(e) {
    setError(e.message || 'Failed to load. Try again.');
    setProgress(0);
  }
  document.getElementById('load-btn').disabled = false;
}

async function fetchPoster(film) {
  try {
    var query = film.name + (film.year ? ' ' + film.year : '');
    var url = 'https://api.themoviedb.org/3/search/movie?api_key=' + TMDB_KEY + '&query=' + encodeURIComponent(film.name) + (film.year ? '&year=' + film.year : '') + '&language=en-US';
    var res = await fetch(url);
    if (!res.ok) return;
    var data = await res.json();
    if (data.results && data.results.length) {
      var match = data.results[0];
      film.poster = match.poster_path ? 'https://image.tmdb.org/t/p/w185' + match.poster_path : null;
      film.tmdbId = match.id;
    }
  } catch(e) {}
}

function applyFilter() {
  var minRating = parseInt(document.getElementById('score-filter').value) * 2 || 0; // convert stars to letterboxd scale
  var q = (document.getElementById('pool-search').value || '').toLowerCase();
  var showScores = document.getElementById('score-toggle').checked;

  var filtered = allFilms.filter(function(f) {
    if (minRating && (f.rating || 0) < minRating) return false;
    return true;
  });

  renderPool(filtered, q, showScores);
}

function renderPool(films, q, showScores) {
  var pool = document.getElementById('pool');
  pool.innerHTML = '';
  var visible = q ? films.filter(function(f) { return f.name.toLowerCase().indexOf(q) !== -1; }) : films;

  if (!visible.length) {
    pool.innerHTML = '<div class="empty-hint">Nothing found</div>';
    document.getElementById('pool-meta').textContent = '';
    return;
  }

  visible.forEach(function(f) {
    if (document.querySelector('.tier-drop [data-slug="' + f.slug + '"]')) return;
    f._showScore = showScores;
    pool.appendChild(makeCard(f));
  });

  var n = pool.querySelectorAll('.film-card').length;
  document.getElementById('pool-meta').textContent = n ? n + ' films' : '';
  syncEmptyHints();
}

function makeCard(film) {
  var div = document.createElement('div');
  div.className = 'film-card';
  div.draggable = true;
  div.dataset.slug = film.slug;

  var posterHTML = film.poster
    ? '<img src="' + film.poster + '" alt="" loading="lazy" decoding="async">'
    : '<div class="no-poster">' + film.name + '</div>';

  var starsHTML = (film.stars && film._showScore !== false)
    ? '<div class="stars-badge">' + starsDisplay(film.stars) + '</div>' : '';

  div.innerHTML = posterHTML + starsHTML +
    '<div class="card-info"><div class="card-title">' + film.name + '</div><div class="card-year">' + (film.year || '') + '</div></div>' +
    '<button class="return-btn" title="Return to pool">&#8617;</button>';

  div.querySelector('.return-btn').addEventListener('click', function(e) {
    e.stopPropagation();
    var pool = document.getElementById('pool');
    var hint = pool.querySelector('.empty-hint');
    if (hint) hint.remove();
    div.style.width = '';
    pool.appendChild(div);
    syncEmptyHints();
    updatePoolMeta();
  });

  div.addEventListener('dragstart', onDragStart);
  div.addEventListener('dragend', onDragEnd);
  addTouchDrag(div);
  return div;
}

// ── Drag & Drop ──────────────────────────────────────────────────────────────
function onDragStart(e) {
  draggedCard = e.currentTarget;
  setTimeout(function() { if (draggedCard) draggedCard.classList.add('dragging'); }, 0);
  e.dataTransfer.effectAllowed = 'move';
}
function onDragEnd() {
  if (draggedCard) draggedCard.classList.remove('dragging');
  draggedCard = null;
  document.querySelectorAll('.drag-over').forEach(function(el) { el.classList.remove('drag-over'); });
  syncEmptyHints(); updatePoolMeta();
}
function setupDrop(zone) {
  zone.addEventListener('dragover', function(e) {
    e.preventDefault(); zone.classList.add('drag-over');
    if (!draggedCard) return;
    var after = getAfterEl(zone, e.clientX);
    if (after) zone.insertBefore(draggedCard, after); else zone.appendChild(draggedCard);
  });
  zone.addEventListener('dragleave', function(e) { if (!zone.contains(e.relatedTarget)) zone.classList.remove('drag-over'); });
  zone.addEventListener('drop', function(e) { e.preventDefault(); zone.classList.remove('drag-over'); syncEmptyHints(); updatePoolMeta(); });
}
function getAfterEl(container, x) {
  var cards = Array.from(container.querySelectorAll('.film-card:not(.dragging):not(.touch-dragging)'));
  return cards.reduce(function(cl, ch) {
    var box = ch.getBoundingClientRect();
    var off = x - box.left - box.width / 2;
    return (off < 0 && off > cl.offset) ? { offset: off, el: ch } : cl;
  }, { offset: -Infinity, el: null }).el;
}
document.querySelectorAll('.tier-drop, #pool').forEach(setupDrop);

// ── Touch Drag ───────────────────────────────────────────────────────────────
var touchCard = null, touchClone = null, lastHighlighted = null;
var touchOffX = 0, touchOffY = 0;

function getZoneAt(x, y) {
  var zones = document.querySelectorAll('.tier-drop, #pool');
  for (var i = 0; i < zones.length; i++) {
    var r = zones[i].getBoundingClientRect();
    if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) return zones[i];
  }
  return null;
}
function onTouchStart(e) {
  if (e.touches.length !== 1) return;
  var card = e.currentTarget;
  var touch = e.touches[0];
  var rect = card.getBoundingClientRect();
  touchOffX = touch.clientX - rect.left;
  touchOffY = touch.clientY - rect.top;
  touchCard = card;
  touchClone = card.cloneNode(true);
  touchClone.classList.add('touch-dragging');
  touchClone.style.width = rect.width + 'px';
  touchClone.style.left = (touch.clientX - touchOffX) + 'px';
  touchClone.style.top  = (touch.clientY - touchOffY) + 'px';
  document.body.appendChild(touchClone);
  card.style.opacity = '0.3';
  document.body.style.userSelect = 'none';
  e.preventDefault();
}
function onTouchMove(e) {
  if (!touchCard || !touchClone) return;
  e.preventDefault();
  var touch = e.touches[0];
  touchClone.style.left = (touch.clientX - touchOffX) + 'px';
  touchClone.style.top  = (touch.clientY - touchOffY) + 'px';
  var zone = getZoneAt(touch.clientX, touch.clientY);
  if (lastHighlighted && lastHighlighted !== zone) lastHighlighted.classList.remove('drop-highlight');
  if (zone) { zone.classList.add('drop-highlight'); lastHighlighted = zone; }
}
function onTouchEnd(e) {
  if (!touchCard || !touchClone) return;
  var touch = e.changedTouches[0];
  var zone = getZoneAt(touch.clientX, touch.clientY);
  if (lastHighlighted) lastHighlighted.classList.remove('drop-highlight');
  if (zone) {
    var after = getAfterEl(zone, touch.clientX);
    var hint = zone.querySelector('.empty-hint');
    if (hint) hint.remove();
    if (after) zone.insertBefore(touchCard, after); else zone.appendChild(touchCard);
  }
  touchCard.style.opacity = '';
  touchClone.remove(); touchClone = null; touchCard = null; lastHighlighted = null;
  document.body.style.userSelect = '';
  syncEmptyHints(); updatePoolMeta();
}
function addTouchDrag(card) {
  card.addEventListener('touchstart', onTouchStart, { passive: false });
  card.addEventListener('touchmove',  onTouchMove,  { passive: false });
  card.addEventListener('touchend',   onTouchEnd,   { passive: false });
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function syncEmptyHints() {
  document.querySelectorAll('.tier-drop').forEach(function(zone) {
    var has = zone.querySelector('.film-card'), hint = zone.querySelector('.empty-hint');
    if (!has && !hint) { var h = document.createElement('div'); h.className = 'empty-hint'; h.textContent = 'Drop here'; zone.appendChild(h); }
    else if (has && hint) hint.remove();
  });
  var pool = document.getElementById('pool');
  var has = pool.querySelector('.film-card'), hint = pool.querySelector('.empty-hint');
  if (!has && !hint) { var h = document.createElement('div'); h.className = 'empty-hint'; h.textContent = 'All films placed!'; pool.appendChild(h); }
  else if (has && hint) hint.remove();
}
function updatePoolMeta() {
  var n = document.getElementById('pool').querySelectorAll('.film-card').length;
  document.getElementById('pool-meta').textContent = n ? n + ' films' : '';
}
function resetTierlist() {
  var pool = document.getElementById('pool');
  document.querySelectorAll('.tier-drop .film-card').forEach(function(c) { c.style.width = ''; pool.appendChild(c); });
  syncEmptyHints(); updatePoolMeta();
}
async function exportImage() {
  var btn = document.querySelector('button[onclick="exportImage()"]');
  btn.disabled = true; btn.textContent = 'Generating...';
  try {
    var canvas = await html2canvas(document.getElementById('tierlist'), { backgroundColor: '#0d0d0f', scale: 2, useCORS: true, allowTaint: false, logging: false });
    var link = document.createElement('a');
    link.download = 'film-tierlist.png'; link.href = canvas.toDataURL('image/png'); link.click();
  } catch(e) { alert('Could not save — try a screenshot.'); }
  btn.disabled = false; btn.textContent = '⬇ Save as PNG';
}

document.getElementById('profile-input').addEventListener('keydown', function(e) { if (e.key === 'Enter') loadProfile(); });
</script>
</body>
